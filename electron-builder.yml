appId: com.founcode.app
productName: Founcode
copyright: © 2026 21Kent

directories:
  buildResources: build
  output: release

# electron-builder auto-packages production node_modules (electron-updater,
# nanoid) alongside these.
files:
  - out/**
  - package.json

# node-pty ships N-API prebuilds (ABI-stable) — no rebuild needed, but
# its .node binary must be unpacked from the asar to be loadable.
npmRebuild: false
asarUnpack:
  - "**/node_modules/node-pty/**"

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64]
    - target: zip
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: Founcode
  artifactName: Founcode-Setup-${version}.${ext}

# Public releases repo (the source stays private). Publishing is manual:
# `electron-builder --publish always` once the repo + GH_TOKEN exist.
publish:
  provider: github
  owner: LittleScript
  repo: founcode-releases
